<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cristo's Grocery - Login</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/CSS/login.css">
    <link rel="shortcut icon" href="src/icons/cristos32.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <img id="logo" src="src/icons/cristo512.png" alt="Logo Cristo's Grocery">
        <h2 class="titulo">Login</h2>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Seu e-mail" autocomplete="email">
        </div>
        <div class="error-message" id="emailError"></div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
            <button type="button" id="toggleSenha" class="toggle-password" aria-label="Mostrar senha">
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>
        <div class="error-message" id="senhaError"></div>
        
        <div class="forgot-password">
            <a href="#" id="esqueciSenha">Esqueceu a senha?</a>
        </div>
        
        <div class="botoes">
            <button id="btnEntrar" class="btn-primary">
                <span>Entrar</span>
                <i class="fas fa-spinner fa-spin" style="display: none;"></i>
            </button>
            <button id="btnCadastrar" class="btn-secondary">Cadastrar</button>
            <button id="btnDemo" class="btn-ghost">Continuar sem login (demo)</button>
        </div>
    </div>
    
    <script type="module" src="auth.js"></script>
</body>
</html>
