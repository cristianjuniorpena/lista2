<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cristo's Grocery - Lista de Compras</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/CSS/index.css">
    <link rel="shortcut icon" href="src/icons/cristos32.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <img id="logo" src="src/icons/cristo512.png" alt="Logo">
            <div class="user-info">
                <span id="userName"></span>
                <button id="logoutBtn" class="logout-btn" aria-label="Sair">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>
        
        <main class="main-content">
            <h1 class="page-title">Lista de Compras</h1>
            
            <!-- Adicionar item -->
            <div class="add-item-form">
                <input type="text" id="newItemInput" placeholder="Ex: Leite, Pão, Queijo..." autocomplete="off">
                <button id="addItemBtn" class="btn-add">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </div>
            
            <!-- Lista de itens -->
            <ul id="shoppingList" class="shopping-list"></ul>
            
            <!-- Mensagem quando vazio -->
            <div id="emptyMessage" class="empty-message" style="display: none;">
                <i class="fas fa-shopping-basket"></i>
                <p>Sua lista está vazia. Adicione itens acima!</p>
            </div>
        </main>
    </div>
    
    <script type="module" src="app.js"></script>
    <script>
        // Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registrado', reg.scope))
                    .catch(err => console.log('Erro no Service Worker', err));
            });
        }
    </script>
</body>
</html>
